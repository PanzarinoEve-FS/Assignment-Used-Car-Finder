<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New ES6/SCSS Project</title>
</head>
<body>
  <header>
 <h1>Find Your Dream Vehicle</h1>
  <p>Have you been dreaming about getting a new vehicle?<br>Well, you're in luck.</p>
  </header>
 
  <section id="car-finder">
    <div class="form-grid">
      <div class="form-grid-item" id="year">
        <label for="year-select">Year</label>
        <fieldset>
          <legend>Year</legend>
        <select id="year-select" name="year">
          <option value="">Vehicle Year</option>
        </select></fieldset>
      </div>
      <div class="form-grid-item" id="make">
        <label for="make-select">Make</label>
        <fieldset>
          <legend>Make</legend>
        
       
        <select id="make-select" name="make">
          <option value="">Vehicle Make</option>
        </select>
        </fieldset>
      </div>
      <div class="form-grid-item" id="model">
        <label for="model-select">Model</label>
        <fieldset>
          <legend>Model</legend>
          <select id="model-select" name="model">
            <option value="">Vehicle Model</option>
          </select>
        </fieldset>
      </div>
    </div>
  </section>
</body>
</html>
